<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Wish Generator | Flame Vortex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor"></div>

    <div class="container generator-box">
        <h1 class="title">Eid Wish Creator 🌙</h1>
        <p>Create a personalized romantic wish link</p>
        
        <div class="input-group">
            <input type="text" id="targetName" placeholder="Enter her/his name..." autocomplete="off">
            
            <div class="gender-selection">
                <label>
                    <input type="radio" name="gender" value="girl" checked> <span>Girl (Princess)</span>
                </label>
                <label>
                    <input type="radio" name="gender" value="boy"> <span>Boy (King)</span>
                </label>
            </div>

            <button class="main-btn" onclick="generateLink()">Create Magic Link ✨</button>
        </div>

        <!-- Generated Link Display -->
        <div id="result-area" style="display: none; margin-top: 20px;">
            <p>Copy this link and send it to your special one:</p>
            <input type="text" id="generatedLink" readonly>
            <button class="main-btn copy-btn" onclick="copyLink()">Copy Link 📋</button>
        </div>
    </div>

    <footer class="credits">
        <p>Developer: <span>Flame Vortex (SIAM)</span></p>
        <p>GitHub: <a href="https://github.com/FlameVortex" target="_blank">FlameVortex</a></p>
    </footer>

    <script>
        function generateLink() {
            const name = document.getElementById('targetName').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;
            
            if (!name) {
                alert("Please enter a name!");
                return;
            }

            // Get current URL and create the shareable link
            const baseUrl = window.location.href.split('index.html')[0] + 'wish.html';
            const finalLink = `${baseUrl}?name=${encodeURIComponent(name)}&g=${gender}`;
            
            document.getElementById('generatedLink').value = finalLink;
            document.getElementById('result-area').style.display = 'block';
            gsap.from("#result-area", {opacity: 0, y: 20, duration: 0.5});
        }

        function copyLink() {
            const linkInput = document.getElementById('generatedLink');
            linkInput.select();
            document.execCommand('copy');
            alert("Link Copied! Now send it to your Special Person. ❤️");
        }

        // Cursor Logic
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });
    </script>
</body>
</html>
