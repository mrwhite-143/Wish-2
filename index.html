<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Wish Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

<div class="stars"></div>

<div class="container generator-box">

<h1 class="title">Eid Wish Creator 🌙</h1>

<p class="subtitle">Create a magical Eid wish for someone special</p>

<input type="text" id="targetName" placeholder="Enter your special person's name">

<div class="gender-selection">

<label>
<input type="radio" name="gender" value="girl" checked>
<span>Princess</span>
</label>

<label>
<input type="radio" name="gender" value="boy">
<span>King</span>
</label>

</div>

<button class="main-btn" onclick="generateLink()">
Create Magic Link ✨
</button>

<div id="result-area">

<input type="text" id="generatedLink" readonly>

<button class="main-btn copy-btn" onclick="copyLink()">
Copy Link 📋
</button>

</div>

</div>

<footer class="credits">

Developer: Flame Vortex (SIAM)

</footer>

<script>

function generateLink(){

const name=document.getElementById("targetName").value;

const gender=document.querySelector('input[name="gender"]:checked').value;

if(!name){

alert("Enter a name first!");

return;

}

const base=window.location.href.split("index.html")[0]+"wish.html";

const link=base+"?name="+encodeURIComponent(name)+"&g="+gender;

document.getElementById("generatedLink").value=link;

document.getElementById("result-area").style.display="block";

gsap.from("#result-area",{y:20,opacity:0,duration:.5})

}

function copyLink(){

const input=document.getElementById("generatedLink");

input.select();

document.execCommand("copy");

alert("Link copied ❤️")

}

</script>

</body>
</html>
