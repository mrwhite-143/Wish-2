<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Mubarak</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

</head>

<body>

<div class="stars"></div>

<div id="welcome-view" class="container">

<img class="hero-gif" src="https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-2202kb-53von6w05v0ekxmt.webp">

<h1 id="main-title" class="title"></h1>

<p class="subtitle">I prepared something special for you</p>

<button class="main-btn" onclick="startShow()">

Open My Heart 💖

</button>

</div>

<div id="wish-display" class="container">

<div id="card-holder"></div>

<button id="next-btn" class="main-btn">

Next Surprise ✨

</button>

</div>

<footer class="credits">

Developer: Flame Vortex (SIAM)

</footer>

<script>

const url=new URLSearchParams(window.location.search)

const name=url.get("name")||"Sweetheart"

const gender=url.get("g")||"girl"

const title=gender==="girl"?"Princess":"King"

document.getElementById("main-title").innerText=`Eid Mubarak ${title} ${name} 🌙`

const wishes=[

{
text:`May this Eid bring endless happiness for you my ${title}.`,
gif:"https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-494kb-aax9dv39khdby1xh.webp"
},

{
text:"You are the most beautiful Eidi in my life.",
gif:"https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-2169kb-sz5qb2llabzg46qu.webp"
},

{
text:"I wish your smile stays forever.",
gif:"https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-2671kb-uudx29i0jja0yyim.webp"
},

{
text:"Sending you hugs and kisses.",
gif:"https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-5725kb-2p6g03lbblpoe1z7.webp"
},

{
text:"Stay with me forever ❤️",
gif:"https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-1136kb-tb9vrnxamrsn3cva.webp"
}

]

let step=0

function startShow(){

gsap.to("#welcome-view",{scale:.8,opacity:0,duration:.5,onComplete:()=>{

document.getElementById("welcome-view").style.display="none"

document.getElementById("wish-display").style.display="block"

showNext()

}})

}

function showNext(){

if(step<wishes.length){

const data=wishes[step]

document.getElementById("card-holder").innerHTML=`

<div class="wish-card">

<img src="${data.gif}">

<p>${data.text}</p>

</div>

`

gsap.from(".wish-card",{scale:.7,opacity:0,duration:.6})

step++

}

}

document.getElementById("next-btn").onclick=showNext

</script>

</body>
</html>
